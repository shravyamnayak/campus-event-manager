<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register – CampusConnect</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #f8fafc;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }
    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 480px;
    }
    .card-header { text-align: center; margin-bottom: 1.75rem; }
    .card-header .icon { font-size: 2.5rem; display: block; margin-bottom: .5rem; }
    .card-header h2 { font-size: 1.5rem; font-weight: 700; color: #1e293b; }
    .card-header p  { color: #64748b; font-size: .9rem; margin-top: .25rem; }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: .75rem; }
    .form-group { margin-bottom: .85rem; }
    .form-group label {
      display: block;
      font-size: .85rem;
      font-weight: 600;
      color: #1e293b;
      margin-bottom: .4rem;
    }
    .form-group input,
    .form-group select {
      width: 100%;
      padding: .6rem .85rem;
      border: 1.5px solid #e2e8f0;
      border-radius: 7px;
      font-size: .9rem;
      outline: none;
      transition: border .15s;
      background: #fff;
    }
    .form-group input:focus,
    .form-group select:focus {
      border-color: #4f46e5;
      box-shadow: 0 0 0 3px rgba(79,70,229,.12);
    }
    .btn {
      width: 100%;
      padding: .7rem;
      background: #4f46e5;
      color: #fff;
      border: none;
      border-radius: 7px;
      font-size: .95rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: .5rem;
      transition: background .15s;
    }
    .btn:hover    { background: #3730a3; }
    .btn:disabled { background: #a5b4fc; cursor: not-allowed; }
    .msg-box {
      border-radius: 6px;
      padding: .7rem .9rem;
      font-size: .85rem;
      margin-bottom: 1rem;
    }
    .msg-error   { background: #fee2e2; color: #991b1b; border-left: 4px solid #ef4444; }
    .msg-success { background: #d1fae5; color: #065f46; border-left: 4px solid #10b981; }
    .msg-debug   { background: #f1f5f9; color: #475569; border-left: 4px solid #94a3b8;
                   font-family: monospace; font-size: .75rem;
                   white-space: pre-wrap; word-break: break-all; }
    .footer-link {
      text-align: center;
      margin-top: 1.25rem;
      font-size: .875rem;
      color: #64748b;
    }
    .footer-link a { color: #4f46e5; text-decoration: none; font-weight: 600; }
    .pw-wrap { position: relative; }
    .pw-wrap input { padding-right: 2.5rem; }
    .pw-toggle {
      position: absolute; right: .75rem; top: 50%;
      transform: translateY(-50%);
      cursor: pointer; color: #94a3b8; user-select: none;
    }
    @media (max-width: 480px) { .row { grid-template-columns: 1fr; } }
  </style>
</head>
<body>

<div class="card">
  <div class="card-header">
    <span class="icon">👤</span>
    <h2>Create Account</h2>
    <p>Join the campus community</p>
  </div>

  <!-- Message area — all messages injected here -->
  <div id="msgArea"></div>

  <div class="row">
    <div class="form-group">
      <label>Full Name *</label>
      <input type="text" id="regName" placeholder="John Doe" autocomplete="name"/>
    </div>
    <div class="form-group">
      <label>Email *</label>
      <input type="email" id="regEmail" placeholder="your@campus.edu" autocomplete="email"/>
    </div>
  </div>

  <div class="row">
    <div class="form-group">
      <label>Password *</label>
      <div class="pw-wrap">
        <input type="password" id="regPassword"
               placeholder="Min 6 characters" autocomplete="new-password"/>
        <span class="pw-toggle" onclick="togglePw()">👁</span>
      </div>
    </div>
    <div class="form-group">
      <label>Role *</label>
      <select id="regRole">
        <option value="student">Student</option>
        <option value="faculty">Faculty</option>
      </select>
    </div>
  </div>

  <div class="form-group">
    <label>Department</label>
    <input type="text" id="regDept" placeholder="e.g. Computer Science"/>
  </div>

  <button class="btn" id="regBtn" onclick="doRegister()">
    Create Account
  </button>

  <p class="footer-link">
    Already have an account? <a href="/login">Login here</a>
  </p>
</div>

<script>
  // ── Helpers ───────────────────────────────────────────────────────
  function togglePw() {
    var i = document.getElementById('regPassword');
    i.type = (i.type === 'password') ? 'text' : 'password';
  }

  function setMsg(text, type) {
    // type: 'error' | 'success' | 'debug'
    var area = document.getElementById('msgArea');
    if (!area) return;
    var div = document.createElement('div');
    div.className = 'msg-box msg-' + type;
    div.textContent = text;
    area.innerHTML = '';
    area.appendChild(div);
  }

  function appendMsg(text, type) {
    var area = document.getElementById('msgArea');
    if (!area) return;
    var div = document.createElement('div');
    div.className = 'msg-box msg-' + type;
    div.textContent = text;
    area.appendChild(div);
  }

  function clearMsg() {
    var area = document.getElementById('msgArea');
    if (area) area.innerHTML = '';
  }

  function getVal(id) {
    var el = document.getElementById(id);
    return el ? el.value : '';
  }

  function resetBtn() {
    var btn = document.getElementById('regBtn');
    if (!btn) return;
    btn.disabled    = false;
    btn.textContent = 'Create Account';
  }

  // ── Main register function ────────────────────────────────────────
  async function doRegister() {
    clearMsg();

    var name       = getVal('regName').trim();
    var email      = getVal('regEmail').trim();
    var password   = getVal('regPassword');
    var role       = getVal('regRole') || 'student';
    var department = getVal('regDept').trim();
    var btn        = document.getElementById('regBtn');

    // ── Validation ────────────────────────────────────────────────
    if (!name) {
      setMsg('Full name is required.', 'error');
      return;
    }
    if (!email || email.indexOf('@') === -1) {
      setMsg('A valid email address is required.', 'error');
      return;
    }
    if (!password || password.length < 6) {
      setMsg('Password must be at least 6 characters.', 'error');
      return;
    }

    // ── Loading state ─────────────────────────────────────────────
    if (btn) {
      btn.disabled    = true;
      btn.textContent = 'Creating account…';
    }

    appendMsg('Sending request to /register…', 'debug');

    // ── Fetch ─────────────────────────────────────────────────────
    var res, rawText, data;

    try {
      res = await fetch('/register', {
        method  : 'POST',
        headers : {
          'Content-Type' : 'application/json',
          'Accept'       : 'application/json'
        },
        body: JSON.stringify({
          name       : name,
          email      : email,
          password   : password,
          role       : role,
          department : department
        })
      });
    } catch (networkErr) {
      setMsg('Network error: ' + networkErr.message, 'error');
      appendMsg('fetch() failed: ' + networkErr.toString(), 'debug');
      resetBtn();
      return;
    }

    // ── Read raw response ─────────────────────────────────────────
    try {
      rawText = await res.text();
    } catch (readErr) {
      setMsg('Could not read server response.', 'error');
      resetBtn();
      return;
    }

    appendMsg('HTTP ' + res.status + '\nResponse: ' + rawText.substring(0, 500), 'debug');

    // ── Parse JSON ────────────────────────────────────────────────
    try {
      data = JSON.parse(rawText);
    } catch (parseErr) {
      setMsg(
        'Server returned HTTP ' + res.status + ' with non-JSON response. ' +
        'Check the debug info below and the Flask terminal for errors.',
        'error'
      );
      resetBtn();
      return;
    }

    // ── Handle response ───────────────────────────────────────────
    if (res.ok && data.success) {
      clearMsg();
      setMsg('Account created! Redirecting to dashboard…', 'success');
      if (btn) btn.textContent = '✓ Done!';
      setTimeout(function() {
        window.location.href = (data.redirect || '/dashboard');
      }, 800);
    } else {
      setMsg(data.error || ('Registration failed. HTTP ' + res.status), 'error');
      resetBtn();
    }
  }

  // ── Enter key support ─────────────────────────────────────────────
  document.addEventListener('DOMContentLoaded', function() {
    ['regName', 'regEmail', 'regPassword', 'regDept'].forEach(function(id) {
      var el = document.getElementById(id);
      if (el) {
        el.addEventListener('keydown', function(e) {
          if (e.key === 'Enter') doRegister();
        });
      }
    });
  });
</script>

</body>
</html>
