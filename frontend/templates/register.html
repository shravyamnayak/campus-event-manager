{% extends "base.html" %}
{% block title %}Register – CampusConnect{% endblock %}
{% block content %}
<div class="auth-container">
  <div class="auth-card">
    <div class="auth-header">
      <i class="fas fa-user-plus"></i>
      <h2>Create Account</h2>
      <p>Join the campus community</p>
    </div>
    <div id="regError" class="alert alert-danger" style="display:none"></div>
    <div class="form-row">
      <div class="form-group">
        <label><i class="fas fa-user"></i> Full Name</label>
        <input type="text" id="regName" placeholder="John Doe" class="form-control"/>
      </div>
      <div class="form-group">
        <label><i class="fas fa-envelope"></i> Email</label>
        <input type="email" id="regEmail" placeholder="your@campus.edu" class="form-control"/>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label><i class="fas fa-lock"></i> Password</label>
        <input type="password" id="regPassword" placeholder="Min 6 characters" class="form-control"/>
      </div>
      <div class="form-group">
        <label><i class="fas fa-users"></i> Role</label>
        <select id="regRole" class="form-control">
          <option value="student">Student</option>
          <option value="faculty">Faculty</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <label><i class="fas fa-building"></i> Department</label>
      <input type="text" id="regDept" placeholder="e.g. Computer Science" class="form-control"/>
    </div>
    <button class="btn btn-primary btn-block" onclick="doRegister()">
      <i class="fas fa-user-plus"></i> Create Account
    </button>
    <p class="auth-footer">Already have an account? <a href="{{ url_for('auth.login') }}">Login here</a></p>
  </div>
</div>
{% endblock %}
{% block scripts %}
<script src="{{ url_for('static', filename='js/auth.js') }}"></script>
{% endblock %}
