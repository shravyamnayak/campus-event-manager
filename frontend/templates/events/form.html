<div class="modal" id="createEventModal">
  <div class="modal-dialog modal-lg">
    <div class="modal-header">
      <h3><i class="fas fa-calendar-plus"></i> Create New Event</h3>
      <button onclick="closeModal('createEventModal')">×</button>
    </div>
    <div class="modal-body">
      <div id="createEventError" class="alert alert-danger" style="display:none"></div>
      <div class="form-row">
        <div class="form-group form-group-2">
          <label>Event Title *</label>
          <input type="text" id="evTitle" class="form-control" placeholder="Annual Tech Symposium"/>
        </div>
        <div class="form-group">
          <label>Type *</label>
          <select id="evType" class="form-control">
            <option value="academic">Academic</option>
            <option value="cultural">Cultural</option>
            <option value="sports">Sports</option>
            <option value="seminar">Seminar</option>
            <option value="workshop">Workshop</option>
            <option value="other">Other</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label>Description</label>
        <textarea id="evDesc" class="form-control" rows="3" placeholder="Event details..."></textarea>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Start Date & Time *</label>
          <input type="datetime-local" id="evStart" class="form-control"/>
        </div>
        <div class="form-group">
          <label>End Date & Time *</label>
          <input type="datetime-local" id="evEnd" class="form-control"/>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Venue</label>
          <select id="evVenue" class="form-control">
            <option value="">-- Select Venue --</option>
          </select>
        </div>
        <div class="form-group">
          <label>Max Attendees</label>
          <input type="number" id="evMax" class="form-control" value="100" min="1"/>
        </div>
      </div>
      <div class="form-group">
        <label class="checkbox-label">
          <input type="checkbox" id="evPublic" checked/>
          <span>Make this event public</span>
        </label>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('createEventModal')">Cancel</button>
      <button class="btn btn-primary" onclick="submitCreateEvent()">
        <i class="fas fa-paper-plane"></i> Submit for Approval
      </button>
    </div>
  </div>
</div>
